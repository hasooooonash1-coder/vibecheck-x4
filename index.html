<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="mylead-verification" content="b85107f6e9f0a0e35c81749a4987bbdb">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تطبيق الموعد المثالي</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; }
        
        #bg-video {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            object-fit: cover;
            /* التأكد من عمل الفيديو على كافة الأجهزة */
        }

        .container {
            display: flex; 
            justify-content: center; 
            align-items: center;
            min-height: 100vh; 
            padding: 20px;
            text-align: center; 
            color: white;
            background: rgba(0, 0, 0, 0.5);
        }

        .content { 
            background: rgba(128, 0, 128, 0.7); 
            padding: 30px; 
            border-radius: 20px; 
            width: 100%; 
            max-width: 500px; 
        }
        
        h1 { margin: 0 0 20px 0; font-size: 1.6rem; }
        p { margin-bottom: 25px; font-size: 1.1rem; }
        
        .trackable-link { 
            text-decoration: none; 
            display: block; 
            width: 100%; 
        }
        
        button {
            padding: 15px 30px; 
            font-size: 1.2rem; 
            cursor: pointer;
            background-color: #ff4757; 
            color: white; 
            border: none;
            border-radius: 50px; 
            width: 100%; 
            font-weight: bold;
            -webkit-appearance: none; /* لمنع تنسيقات الآيفون الافتراضية */
        }
    </style>
</head>
<body>

    <!-- تم إضافة الخصائص اللازمة لضمان التشغيل في iOS -->
    <video autoplay muted loop playsinline webkit-playsinline id="bg-video">
        <source src="vibecheck-x4.mp4">
    </video>

    <div class="container">
        <div class="content">
            <h1>هل أنت مستعد لبدء قصة جديدة؟</h1>
            <p>سنجد لك من يناسبك من بين آلاف المشتركين ، فقط أجب عن الأسئلة</p>
            
            <a href="https://safeoffers.pro/a/VOqK5S85XcQJRX" class="trackable-link">
                <button>ابدأ رحلتك الآن</button>
            </a>
        </div>
    </div>
<script>
document.addEventListener("DOMContentLoaded", function() {

    // Click ID فريد
    const uniqueClickId = 'org_' + Math.floor(Math.random() * 100000) + '_' + Date.now();

    // قراءة القيم القادمة من الرابط الخارجي
    const incomingParams = new URLSearchParams(window.location.search);

    // المصدر الرئيسي الذي ستحدده أنت في روابط النشر
   let source = incomingParams.get('sub1') || 'direct';

    // معلومات إضافية اختيارية
    let campaign = incomingParams.get('sub2') || '';
    let creative = incomingParams.get('sub3') || '';

    const links = document.querySelectorAll('a.trackable-link');

    links.forEach(function(link) {

        let originalUrl = link.getAttribute('href');

        if (!originalUrl) return;

        let offerUrl = new URL(originalUrl);

        // المتغيرات التي يقرأها MyLead
        offerUrl.searchParams.set('ml_sub1', source);
        offerUrl.searchParams.set('ml_sub2', campaign);
        offerUrl.searchParams.set('ml_sub3', creative);

        // Click ID خاص بك
        offerUrl.searchParams.set('clickid', uniqueClickId);

        // معلومات إضافية للمراجعة
        offerUrl.searchParams.set('landing_domain', window.location.hostname);

        link.setAttribute('href', offerUrl.toString());
    });

});
</script>
</body>
</html>
